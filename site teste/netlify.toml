# THEMAF1A STORE - Netlify Configuration
# https://docs.netlify.com/

# Build Command
[build]
  command = "echo 'Build: Site estático com Netlify Functions'"
  functions = "netlify/functions"
  publish = "."

# Environment Variables (CONFIGURAR MANUALMENTE NO DASHBOARD!)
# https://app.netlify.com/sites/seu-site/settings/deploys#environment

# Redirects para SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache para assets
[[headers]]
  for = "/src/**"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
